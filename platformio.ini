; PlatformIO Project Configuration File
;
; ESP32 ArtNetNode — builds for two boards (Olimex ESP32-POE / WT32-ETH01)
; and two device variants (rack / mini). Each env passes a board macro and a
; variant macro that src/main.c selects on at compile time.
;
;   olimex-rack / olimex-mini  -> the deployed hardware (Olimex ESP32-POE)
;   wt32-rack   / wt32-mini    -> secondary target (WT32-ETH01); pin maps TBD
;
; Build a specific target, e.g.:  pio run -e olimex-rack
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
framework = espidf

[env:olimex-rack]
board = esp32-poe
build_flags = -DBOARD_OLIMEX_ESP32_POE -DVARIANT_RACK

[env:olimex-mini]
board = esp32-poe
build_flags = -DBOARD_OLIMEX_ESP32_POE -DVARIANT_MINI

[env:wt32-rack]
board = wt32-eth01
build_flags = -DBOARD_WT32_ETH01 -DVARIANT_RACK

[env:wt32-mini]
board = wt32-eth01
build_flags = -DBOARD_WT32_ETH01 -DVARIANT_MINI
