<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:,">
<title>ArtNetNode</title>
<style>
/* Dark palette (default). The whole UI is themed through these vars; the
 * prefers-color-scheme:light block below is the only place that overrides them,
 * so the page follows the OS setting with no toggle. */
:root{--bg:#11151c;--card:#1b212b;--fg:#e8edf2;--mut:#8b97a6;--line:#2a323d;--acc:#4da3ff;--ok:#3ecf8e;--bad:#e5484d;--inset:#0d1117;--ghost-h:#222a35;--led-off:#55606e;--btn:#4da3ff;--btn-h:#62b0ff;
  /* series colors: shared by each metric's value readout and its graph stroke,
   * kept identical in both themes so the number always matches its sparkline. */
  --g-pps:#4da3ff;--g-ref:#3ecf8e;--g-load:#f0a73f}
/* Light palette: greens/reds/blue darkened a touch so they stay legible as text
 * on white cards; the primary button stays a lighter, friendlier blue. */
@media(prefers-color-scheme:light){
  :root{--bg:#f4f6f9;--card:#ffffff;--fg:#1b2530;--mut:#5b6776;--line:#d3dae3;--acc:#2b7de0;--ok:#1f9d63;--bad:#d23a40;--inset:#eef1f5;--ghost-h:#e4e9f0;--led-off:#aab4c0;--btn:#5a9bea;--btn-h:#74acef}
}
*{box-sizing:border-box}
/* color-scheme:light dark lets native form controls (number spinners, the select
 * arrow) follow the OS theme, matching the var-driven palette above. */
body{margin:0;background:var(--bg);color:var(--fg);color-scheme:light dark;font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
.wrap{max-width:560px;margin:0 auto;padding:28px 16px 56px}
h1{font-size:20px;margin:0 0 2px;letter-spacing:.2px}
/* connection LED: grey until the first poll, green while /api/state replies,
 * red once a poll fails (decays via the 1 s interval's catch). */
.led{display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--led-off);vertical-align:middle;margin-left:7px;transition:background .3s,box-shadow .3s}
.led.ok{background:var(--ok);box-shadow:0 0 7px var(--ok)}
.led.bad{background:var(--bad);box-shadow:0 0 7px var(--bad)}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:16px}
label{display:block;color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
input,select{width:100%;background:var(--inset);border:1px solid var(--line);color:var(--fg);border-radius:8px;padding:9px 10px;font-size:15px;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(77,163,255,.15)}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.grid .o{text-align:center;color:var(--mut);font-size:11px;margin-bottom:4px}
.grid input{text-align:center;padding:9px 4px}
/* an edited output keeps a red border and is no longer overwritten by the
 * periodic poll, until the next Save reseeds it. */
/* edited fields (outputs, mode, sync, channels) carry a red border and are no
 * longer overwritten by the poll, until the next Save/Reset reseeds them. After
 * the focus rule so an edited field stays red even while focused. */
input.edit,select.edit{border-color:var(--bad);box-shadow:0 0 0 3px rgba(229,72,77,.15)}
.row{display:flex;gap:12px}.row>div{flex:1}
.foot{color:var(--mut);font-size:13px;text-align:center;margin-top:28px}
button{display:block;width:fit-content;margin:0 auto;background:var(--btn);color:#04101f;border:0;border-radius:8px;padding:9px 40px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s,color .15s}
button:hover{background:var(--btn-h)}
button:active{transform:translateY(1px)}
.btns{display:flex;gap:12px;justify-content:center}.btns button{margin:0}
button.ghost{background:var(--inset);color:var(--fg);border:1px solid var(--line)}
button.ghost:hover{background:var(--ghost-h)}
/* pencil button next to the header opens the name dialog */
button.iconbtn{display:inline-block;width:auto;margin:0 0 0 8px;padding:2px 7px;font-size:14px;font-weight:400;background:transparent;color:var(--mut);vertical-align:middle}
button.iconbtn:hover{background:transparent;color:var(--fg)}
dialog{background:var(--card);color:var(--fg);border:1px solid var(--line);border-radius:12px;padding:20px;width:90%;max-width:340px}
dialog::backdrop{background:rgba(0,0,0,.55)}
dialog label{margin-top:14px}dialog label:first-child{margin-top:0}
.stat{display:flex;justify-content:space-between;align-items:center;color:var(--mut);font-size:13px}
.stat b{color:var(--ok);font-size:18px;font-variant-numeric:tabular-nums}
/* each readout matches its sparkline color (see --g-* above) */
#pps{color:var(--g-pps)}#refresh{color:var(--g-ref)}#load0{color:var(--g-load)}
.graph{width:100%;height:60px;display:block;margin:8px 0 0;background:var(--inset);border:1px solid var(--line);border-radius:8px}
.graph+.stat{margin-top:16px}
.ax{color:var(--mut);font-size:11px;text-align:right;margin-top:6px}
#msg{color:var(--mut);font-size:12px;text-align:center;height:16px;margin-top:10px}
input[type=file]{padding:7px 8px;font-size:13px}
.bar{display:none;height:8px;background:var(--inset);border:1px solid var(--line);border-radius:6px;margin:12px 0 8px;overflow:hidden}
.bar>span{display:block;height:100%;width:0;background:var(--acc);transition:width .2s}
#otamsg{color:var(--mut);font-size:12px;text-align:center;height:16px;margin-top:6px}
/* Mobile: 7 universe boxes get too narrow for 5-digit numbers, so wrap to 4 per
 * row (4 + 3); and stack Mode/Sync/Channels full-width instead of squeezing three
 * controls across the screen. Must come AFTER the base .grid/.row rules — media
 * queries add no specificity, so an earlier @media loses to a later plain rule. */
@media(max-width:480px){
  .grid{grid-template-columns:repeat(4,1fr);gap:8px}
  .row{flex-wrap:wrap}.row>div{flex:1 1 100%}
}
</style>
</head>
<body>
<div class="wrap">
  <h1><span id="title">ArtNetNode</span> <span class="led" id="led"></span><button class="iconbtn" onclick="openName()" title="Edit name">&#9998;</button></h1>

  <div class="card" style="margin-top:18px">
    <label>Output &rarr; Universe</label>
    <div class="grid" id="patch"></div>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <label>Mode</label>
        <select id="sync" onchange="this.classList.add('edit')"><option value="0">Free-run</option><option value="1">Uni-Sync</option><option value="2">ArtSync</option></select>
      </div>
      <div><label>Sync universe</label><input id="sync_addr" type="number" min="0" inputmode="numeric" onfocus="this.select()" oninput="this.classList.add('edit')"></div>
      <div><label>Channels</label><input id="num_chan" type="number" min="1" max="512" inputmode="numeric" onfocus="this.select()" oninput="this.classList.add('edit')"></div>
    </div>
  </div>

  <div class="btns"><button class="ghost" onclick="reset()">Reset</button><button onclick="save()">Save</button></div>
  <div id="msg"></div>

  <div class="card" style="margin-top:8px">
    <div class="stat"><span>Art-Net packets/sec</span><b id="pps">&ndash;</b></div>
    <canvas id="g_pps" class="graph"></canvas>
    <div class="stat"><span>Refresh rate</span><b id="refresh">&ndash;</b></div>
    <canvas id="g_ref" class="graph"></canvas>
    <div class="stat"><span>Core&nbsp;0 load</span><b id="load0">&ndash;</b></div>
    <canvas id="g_load" class="graph"></canvas>
    <div class="ax">last 60 s</div>
  </div>

  <div class="card">
    <label>Firmware update</label>
    <input type="file" id="fw" accept=".bin">
    <button onclick="ota()" style="margin-top:14px">Upload &amp; flash</button>
    <div class="bar" id="otabar"><span id="otafill"></span></div>
    <div id="otamsg"></div>
  </div>

  <div class="foot" id="ident">connecting…</div>
</div>

<dialog id="namedlg">
  <label>Name suffix</label>
  <input id="i_suffix" maxlength="14" oninput="nprev()" onfocus="this.select()">
  <div class="foot" id="nprev" style="margin-top:10px;line-height:1.6"></div>
  <div class="btns" style="margin-top:18px">
    <button class="ghost" onclick="namedlg.close()">Cancel</button>
    <button onclick="saveName()">Save</button>
  </div>
</dialog>

<script>
var $=function(id){return document.getElementById(id)};
function grid(){var h="";for(var i=0;i<7;i++)h+='<div><div class="o">'+(i+1)+'</div><input type="number" min="0" inputmode="numeric" id="p'+i+'" oninput="this.classList.add(\'edit\')" onfocus="this.select()"></div>';$("patch").innerHTML=h;}
function led(ok){$("led").className="led "+(ok?"ok":"bad");}
/* Client-side history (R28): up to 60 samples (~1 min at the 1 s poll). The ESP
 * stores nothing — the browser accumulates and draws these. */
var N=60,hPps=[],hRef=[],hLoad=[],curSuffix="";
/* Name prefixes — must match NAME_*_PREFIX in src/main.c. The user edits only the
 * suffix; short/long/hostname are derived (R30/R34). */
var PSHORT="LF ",PLONG="LICHTFETISCH ArtNet Node ",PHOST="LF-ArtNetNode-";
/* graph stroke colors pulled from the same --g-* CSS vars the readouts use, so a
 * sparkline can never drift from its number. */
var cs=getComputedStyle(document.documentElement),
    CPPS=cs.getPropertyValue("--g-pps").trim(),
    CREF=cs.getPropertyValue("--g-ref").trim(),
    CLOAD=cs.getPropertyValue("--g-load").trim();
function push(a,v){a.push(v);if(a.length>N)a.shift();}
/* Sparkline: newest sample at the right edge, 0-baselined. Scales to the window
 * max, or to fixedMax when given (used for the 0-100 % load graph). Plain canvas,
 * no libraries (R7/R27). */
function draw(id,a,color,fixedMax){
  var c=$(id),dpr=window.devicePixelRatio||1,w=c.clientWidth,h=c.clientHeight;
  c.width=w*dpr;c.height=h*dpr;var x=c.getContext("2d");x.scale(dpr,dpr);
  x.clearRect(0,0,w,h);if(a.length<2)return;
  var pad=5,max=fixedMax||Math.max.apply(null,a);if(max<=0)max=1;
  var step=w/(N-1),off=N-a.length;
  var px=function(i){return (off+i)*step},py=function(v){return h-pad-(v/max)*(h-2*pad)};
  x.beginPath();x.moveTo(px(0),py(a[0]));
  for(var i=1;i<a.length;i++)x.lineTo(px(i),py(a[i]));
  x.strokeStyle=color;x.lineWidth=1.5;x.lineJoin="round";x.stroke();
  x.lineTo(px(a.length-1),h-pad);x.lineTo(px(0),h-pad);x.closePath();
  x.globalAlpha=.12;x.fillStyle=color;x.fill();x.globalAlpha=1;
}
/* seed(): set an input/select from the device unless the user has edited it
 * (.edit) — shared by every editable control so the poll never clobbers an
 * in-progress change; edited fields stay red until the next Save/Reset. */
function seed(id,v){var el=$(id);if(!el.classList.contains("edit"))el.value=v;}
/* live(): runs every poll. Reseeds the editable controls (skipping edited ones),
 * feeds the history graphs and lights the connection LED green. */
function live(s){
  led(true);
  curSuffix=s.suffix;
  document.title=s.name;$("title").textContent=s.lname;
  for(var i=0;i<7;i++)seed("p"+i,s.patch[i]);
  seed("sync",s.sync);seed("sync_addr",s.sync_addr);seed("num_chan",s.num_chan);
  $("refresh").textContent=s.refresh.toFixed(1)+" Hz";
  $("pps").textContent=(s.pps|0)+"/s";
  $("load0").textContent=(s.load0|0)+"%";
  push(hPps,s.pps|0);push(hRef,s.refresh);push(hLoad,s.load0|0);
  draw("g_pps",hPps,CPPS);draw("g_ref",hRef,CREF);draw("g_load",hLoad,CLOAD,100);
}
/* set(): force a control to the device value and clear its edit flag (used by
 * fill on load / after Save / on Reset). */
function set(id,v){var el=$(id);el.value=v;el.classList.remove("edit");}
/* fill(): hard-seed every editable control from the device and drop all edit
 * flags — on first load, right after a successful Save, and on Reset. */
function fill(s){
  $("ident").textContent=s.board+" · "+s.variant+" · fw "+s.fw;
  for(var i=0;i<7;i++)set("p"+i,s.patch[i]);
  set("sync",s.sync);set("sync_addr",s.sync_addr);set("num_chan",s.num_chan);
  live(s);
}
/* reset(): discard all unsaved edits and reseed from a fresh device poll. */
function reset(){$("msg").textContent="";poll().then(fill)
  .catch(function(){$("msg").textContent="offline";led(false)});}
/* hostname preview: mirror the firmware's DNS sanitization (non-alnum -> '-', no
 * trailing '-'). Kept in sync with apply_node_names() in src/main.c. */
function hostOf(suf){var h=PHOST+suf.replace(/[^A-Za-z0-9]/g,"-");return h.replace(/-+$/,"");}
/* nprev(): live read-only preview of the three derived names as the user types.
 * esc() neutralizes </& so a typed suffix can't inject markup into the preview. */
function esc(t){return t.replace(/&/g,"&amp;").replace(/</g,"&lt;");}
function nprev(){var s=$("i_suffix").value;
  $("nprev").innerHTML=esc("Short: "+PSHORT+s)+"<br>"+esc("Long: "+PLONG+s)+"<br>"+esc("Host: "+hostOf(s));}
/* name dialog: seed the suffix from the last poll, then POST it (URL-encoded so
 * spaces/punctuation survive) through the shared /api/config save path. */
function openName(){$("i_suffix").value=curSuffix;nprev();$("namedlg").showModal();}
function saveName(){
  var q="suffix="+encodeURIComponent($("i_suffix").value);
  fetch("/api/config?"+q,{method:"POST"}).then(function(r){return r.json()})
    .then(function(s){fill(s);$("namedlg").close();}).catch(function(){$("namedlg").close()});
}
/* poll(): GET /api/state with a hard 600 ms abort. On a LAN a healthy node
 * answers in a few ms, so anything slower is treated as dead and the LED goes
 * red within ~1 poll instead of waiting out the browser's default TCP timeout. */
function poll(){
  var ctl=new AbortController(),t=setTimeout(function(){ctl.abort()},600);
  return fetch("/api/state",{signal:ctl.signal}).then(function(r){clearTimeout(t);return r.json()});
}
function load(){poll().then(fill)
  .catch(function(){$("ident").textContent="offline";led(false)});}
function save(){
  var p=[];for(var i=0;i<7;i++)p.push($("p"+i).value|0);
  var q="patch="+p.join(",")+"&sync="+$("sync").value+"&sync_addr="+($("sync_addr").value|0)+"&num_chan="+($("num_chan").value|0);
  $("msg").textContent="saving…";
  fetch("/api/config?"+q,{method:"POST"}).then(function(r){return r.json()}).then(function(s){
    fill(s);$("msg").textContent="saved";setTimeout(function(){$("msg").textContent=""},1500);
  }).catch(function(){$("msg").textContent="save failed"});
}
/* ota(): raw-stream the chosen .bin to /api/ota (octet-stream body, no multipart).
 * XHR (not fetch) for the upload-progress events. The device blocks DMX, writes
 * the inactive slot and reboots; the rollback foundation reverts a bad image. */
function ota(){
  var f=$("fw").files[0];if(!f){$("otamsg").textContent="pick a firmware.bin first";return;}
  if(!confirm("Flash "+f.name+" ("+((f.size/1024)|0)+" KB)?\nUpload the firmware.bin image. DMX output stops during the update and the device reboots."))return;
  var x=new XMLHttpRequest();x.open("POST","/api/ota");
  $("otabar").style.display="block";$("otafill").style.width="0";$("otamsg").textContent="uploading…";
  x.upload.onprogress=function(e){if(e.lengthComputable)$("otafill").style.width=(100*e.loaded/e.total).toFixed(0)+"%";};
  x.onload=function(){if(x.status==200){$("otafill").style.width="100%";$("otamsg").textContent="flashed — rebooting, reconnect in ~10 s";}
    else $("otamsg").textContent="failed: "+(x.responseText||x.status);};
  x.onerror=function(){$("otamsg").textContent="upload error";};
  x.send(f);
}
grid();load();
setInterval(function(){poll().then(live).catch(function(){led(false)});},1000);
</script>
</body>
</html>
